<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Generate Gift Code</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="header"><div class="inner">
  <button class="menu-btn" id="menuBtn" type="button"><span></span></button>
  <div class="brand">LOMASHARES</div>
</div></header>

<div class="sheet" id="sheet"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="drawer-title">Admin</div>
    <button class="close-btn" id="closeDrawer" type="button">✕</button>
  </div>
  <div class="nav">
    <a href="admin-gift.html">Generate Gift Code <small>bonus</small></a>
    <a href="admin-summary.html">Admin Summary <small>totals</small></a>
    <a href="admin-withdrawals.html">Approve Withdrawals <small>pending</small></a>
    <a href="profile.html">Profile <small>account</small></a>
  </div>
</aside>

<main class="app">
  <section class="card hero">
    <h1 style="margin:0;font-size:18px">Generate Gift Code</h1>
    <p class="small" style="margin:8px 0 0">Create a one-time gift code for users.</p>
  </section>

  <section class="card form" style="margin-top:14px">
    <div class="field">
      <label>Amount (₦)</label>
      <input class="input" id="amount" inputmode="numeric" placeholder="e.g. 500"/>
    </div>
    <button class="btn primary" id="genBtn" type="button" style="margin-top:14px">Generate</button>

    <div class="field" style="margin-top:14px">
      <label>Generated Code</label>
      <input class="input" id="code" readonly value=""/>
    </div>
    <button class="btn" id="copyBtn" type="button" style="margin-top:14px">Copy Code</button>
  </section>
</main>

<div class="notice" id="notice"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL="YOUR_SUPABASE_URL_HERE";
  const SUPABASE_ANON="YOUR_SUPABASE_ANON_KEY_HERE";
  const sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const notice=document.getElementById("notice");
  const toast=(m)=>{notice.textContent=m;notice.classList.add("show");setTimeout(()=>notice.classList.remove("show"),2400);};

  // Drawer
  const drawer=document.getElementById("drawer"), sheet=document.getElementById("sheet");
  document.getElementById("menuBtn").onclick=()=>{drawer.classList.add("show");sheet.classList.add("show");};
  document.getElementById("closeDrawer").onclick=()=>{drawer.classList.remove("show");sheet.classList.remove("show");};
  sheet.onclick=()=>{drawer.classList.remove("show");sheet.classList.remove("show");};

  async function mustLogin(){
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.href="index.html"; return null; }
    return session;
  }
  async function apiPost(path,payload,token){
    const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(payload)});
    const d=await r.json().catch(()=>({})); return {r,d};
  }
  function copy(v){navigator.clipboard.writeText(v).then(()=>toast("Copied ✅")).catch(()=>toast("Copy failed"));}

  document.getElementById("copyBtn").onclick=()=>copy(document.getElementById("code").value);

  document.getElementById("genBtn").addEventListener("click", async ()=>{
    const s=await mustLogin(); if(!s) return;
    const amt = Math.floor(Number((document.getElementById("amount").value||"").replace(/[^0-9]/g,"")));
    if(!amt || amt<=0) return toast("Enter amount");

    toast("Generating...");
    const {r,d}=await apiPost("/api/gift",{action:"generate", amount: amt}, s.access_token);
    if(!r.ok) return toast(d?.error || "Generate failed");

    document.getElementById("code").value = d.code || "";
    toast("Gift code generated ✅");
  });
</script>
</body>
  </html>
