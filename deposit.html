<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Deposit</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="header">
  <div class="inner">
    <button class="menu-btn" id="menuBtn" type="button"><span></span></button>
    <div class="brand">LOMASHARES</div>
  </div>
</header>

<div class="sheet" id="sheet"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="drawer-title">LomaShares</div>
    <button class="close-btn" id="closeDrawer" type="button">✕</button>
  </div>
  <div class="nav">
    <a href="dashboard.html">Dashboard <small>home</small></a>
    <a href="deposit.html">Deposit <small>fund wallet</small></a>
    <a href="withdraw.html">Withdraw <small>cashout</small></a>
    <a href="profile.html">Profile <small>account</small></a>
  </div>
</aside>

<main class="app">
  <section class="card hero">
    <h1 style="margin:0;font-size:18px">Deposit</h1>
    <p class="small" style="margin:8px 0 0">Fund your wallet securely via Paystack.</p>
  </section>

  <section class="card form" style="margin-top:14px">
    <div class="field">
      <label>Amount (₦)</label>
      <input class="input" id="amount" inputmode="numeric" placeholder="Minimum ₦1,000"/>
    </div>

    <div class="chips">
      <button class="chip" data-amt="1000">₦1,000</button>
      <button class="chip" data-amt="5000">₦5,000</button>
      <button class="chip" data-amt="10000">₦10,000</button>
      <button class="chip" data-amt="30000">₦30,000</button>
      <button class="chip" data-amt="50000">₦50,000</button>
      <button class="chip" data-amt="100000">₦100,000</button>
    </div>

    <button class="btn primary" id="payBtn" type="button" style="margin-top:14px">Pay with Paystack</button>
    <div class="small" style="margin-top:10px">After payment you’ll return here automatically and your wallet will update.</div>
  </section>

  <section class="card hero" style="margin-top:14px">
    <div class="balance">
      <div class="label">Current Wallet Balance</div>
      <div class="amt" id="bal">₦0</div>
      <div class="sub" id="balSub">Loading...</div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="inner">
    <a class="ft" href="dashboard.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.6"/></svg>
      Home
    </a>
    <a class="ft" href="investment.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M4 19V5m0 14h16M7 15l3-3 3 3 5-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Invest
    </a>
    <a class="ft" href="team.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M16 11a4 4 0 1 0-8 0m12 9a6 6 0 0 0-12 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Team
    </a>
    <a class="ft active" href="profile.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm8 9a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Profile
    </a>
  </div>
</footer>

<div class="notice" id="notice"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://lpnnqxalmihxgszoifpa.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwbm5xeGFsbWloeGdzem9pZnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzM1ODEsImV4cCI6MjA4NzMwOTU4MX0.1hLW5gizjcPTKyfzx_XD9dxqegtXVQroNCclX1AaqZw";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const notice=document.getElementById("notice");
  const toast=(m)=>{notice.textContent=m;notice.classList.add("show");setTimeout(()=>notice.classList.remove("show"),2400);};

  // Drawer
  const drawer=document.getElementById("drawer"), sheet=document.getElementById("sheet");
  const openDrawer=()=>{drawer.classList.add("show");sheet.classList.add("show");}
  const closeDrawer=()=>{drawer.classList.remove("show");sheet.classList.remove("show");}
  document.getElementById("menuBtn").onclick=openDrawer;
  document.getElementById("closeDrawer").onclick=closeDrawer;
  sheet.onclick=closeDrawer;

  const money=(n)=>"₦"+Number(n||0).toLocaleString();

  async function mustLogin(){
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.href="index.html"; return null; }
    return session;
  }

  async function apiPost(path, payload, token){
    const res=await fetch(path,{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+token },
      body: JSON.stringify(payload)
    });
    const data=await res.json().catch(()=> ({}));
    return {res,data};
  }

  async function loadBalance(session){
    const {res,data}=await apiPost("/api/wallet",{ action:"get" }, session.access_token);
    if(!res.ok){ document.getElementById("balSub").textContent="Failed to load wallet."; return; }
    document.getElementById("bal").textContent=money(data.balance||0);
    document.getElementById("balSub").textContent="This is your available wallet balance.";
  }

  // Quick chips
  const amountEl=document.getElementById("amount");
  document.querySelectorAll("[data-amt]").forEach(b=>{
    b.addEventListener("click", ()=>{
      amountEl.value = b.dataset.amt;
      amountEl.focus();
    });
  });

  // Paystack return verify
  function qp(name){
    const u=new URL(location.href);
    return u.searchParams.get(name);
  }

  (async()=>{
    const session=await mustLogin();
    if(!session) return;

    await loadBalance(session);

    const ref = qp("reference") || qp("trxref");
    if(ref){
      toast("Verifying deposit...");
      const {res,data}=await apiPost("/api/wallet",{ action:"paystack_verify", reference: ref }, session.access_token);
      if(res.ok){
        toast(data.already_credited ? "Already credited ✅" : "Deposit credited ✅");
        await loadBalance(session);
        // clean URL
        history.replaceState({}, "", "deposit.html");
      }else{
        toast(data?.error || "Verification failed");
      }
    }
  })();

  document.getElementById("payBtn").addEventListener("click", async ()=>{
    const session=await mustLogin();
    if(!session) return;

    const amount = Math.floor(Number((amountEl.value||"").replace(/[^0-9]/g,"")));
    if(!amount || amount < 1000) return toast("Minimum deposit is ₦1000");

    toast("Opening Paystack...");
    const callback_url = location.origin + "/deposit.html";
    const {res,data}=await apiPost("/api/wallet",{ action:"paystack_init", amount, callback_url }, session.access_token);

    if(!res.ok) return toast(data?.error || "Paystack init failed");
    location.href = data.authorization_url;
  });
</script>
</body>
  </html>
