<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LomaShares • Deposit History</title><link rel="stylesheet" href="style.css"/></head>
<body>
<header class="header"><div class="inner">
<button class="menu-btn" id="menuBtn" type="button"><span></span></button>
<div class="brand">LOMASHARES</div></div></header>

<div class="sheet" id="sheet"></div>
<aside class="drawer" id="drawer"><div class="drawer-top">
<div class="drawer-title">LomaShares</div><button class="close-btn" id="closeDrawer" type="button">✕</button></div>
<div class="nav"><a href="dashboard.html">Dashboard <small>home</small></a><a href="deposits.html">Deposits <small>history</small></a><a href="profile.html">Profile <small>account</small></a></div>
</aside>

<main class="app">
<section class="card hero"><h1 style="margin:0;font-size:18px">Deposit History</h1><p class="small" style="margin:8px 0 0">All wallet funding records.</p></section>
<section class="card list" id="list" style="margin-top:14px"><div class="small">Loading...</div></section>
</main>

<footer class="footer"><div class="inner">
<a class="ft" href="dashboard.html"><svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.6"/></svg>Home</a>
<a class="ft" href="investment.html"><svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M4 19V5m0 14h16M7 15l3-3 3 3 5-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Invest</a>
<a class="ft" href="team.html"><svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M16 11a4 4 0 1 0-8 0m12 9a6 6 0 0 0-12 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Team</a>
<a class="ft active" href="profile.html"><svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm8 9a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Profile</a>
</div></footer>

<div class="notice" id="notice"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://lpnnqxalmihxgszoifpa.supabase.co", SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwbm5xeGFsbWloeGdzem9pZnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzM1ODEsImV4cCI6MjA4NzMwOTU4MX0.1hLW5gizjcPTKyfzx_XD9dxqegtXVQroNCclX1AaqZw";
const sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const money=n=>"₦"+Number(n||0).toLocaleString();

const drawer=document.getElementById("drawer"), sheet=document.getElementById("sheet");
document.getElementById("menuBtn").onclick=()=>{drawer.classList.add("show");sheet.classList.add("show");};
document.getElementById("closeDrawer").onclick=()=>{drawer.classList.remove("show");sheet.classList.remove("show");};
sheet.onclick=()=>{drawer.classList.remove("show");sheet.classList.remove("show");};

async function mustLogin(){const {data:{session}}=await sb.auth.getSession(); if(!session){location.href="index.html"; return null;} return session;}
async function apiPost(path,payload,token){const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(payload)}); const d=await r.json().catch(()=>({})); return {r,d};}

(async()=>{
  const s=await mustLogin(); if(!s) return;
  const box=document.getElementById("list");
  const {r,d}=await apiPost("/api/wallet",{action:"deposits"}, s.access_token);
  if(!r.ok){box.innerHTML=`<div class="small">No deposits yet</div>`; return;}
  const rows=d.deposits||[];
  if(rows.length===0){box.innerHTML=`<div class="small">No deposits yet</div>`; return;}
  box.innerHTML=rows.map(x=>`
    <div class="item">
      <div class="left">
        <div class="title">${money(x.amount)} • Deposit</div>
        <div class="sub">${new Date(x.created_at||Date.now()).toLocaleString()}${x.reference?" • "+x.reference:""}</div>
      </div>
      <div class="badge success">success</div>
    </div>
  `).join("");
})();
</script></body></html>
